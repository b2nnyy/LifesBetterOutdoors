<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Sign in — LifesBetterOutdoors (preview)</title>
  <meta name="theme-color" content="#F4F7F5" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&amp;family=Outfit:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-gate-page">

  <div class="login-gate-card">
    <span class="eyebrow">LifesBetterOutdoors</span>
    <h1>Welcome back</h1>
    <p class="lead">Sign in to view the client preview — nothing behind the gate claims final services until LifesBetterOutdoors confirms.</p>

    <div class="login-gate-error" id="login-error" role="alert">That username or password does not match.</div>

    <form id="login-form" novalidate>
      <div class="form-grid" style="grid-template-columns: 1fr;">
        <div class="field">
          <label for="login-user">Username</label>
          <input id="login-user" name="username" type="text" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="login-pass">Password</label>
          <input id="login-pass" name="password" type="password" autocomplete="current-password" required />
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Enter site</button>
      </div>
    </form>
  </div>

  <script>
    (function () {
      var AUTH_KEY = 'lbo_auth_v1';
      var USER = 'admin';
      var PASS = 'password';

      try {
        if (sessionStorage.getItem(AUTH_KEY) === '1') {
          location.replace(new URL('index.html', location.href).href);
          return;
        }
      } catch (e) {}

      var form = document.getElementById('login-form');
      var err = document.getElementById('login-error');
      form.querySelectorAll('input').forEach(function (inp) {
        inp.addEventListener('input', function () {
          err.classList.remove('is-visible');
        });
      });
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var u = document.getElementById('login-user').value.trim();
        var p = document.getElementById('login-pass').value;
        if (u === USER && p === PASS) {
          try {
            sessionStorage.setItem(AUTH_KEY, '1');
          } catch (x) {}
          location.replace(new URL('index.html', location.href).href);
          return;
        }
        err.classList.add('is-visible');
      });
    })();
  </script>
</body>
</html>
